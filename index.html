<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anniversaire Talia 🎂</title>

<style>
body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
}

h1{
    text-align:center;
    padding:20px;
    font-size:32px;
}

#galerie{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.photo-card{
    background:#1b1b1b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(255,255,255,0.1);
}

.photo-card img{
    width:100%;
    display:block;
}

.photo-info{
    padding:15px;
}

.photo-info h3{
    margin:0;
    font-size:18px;
}

.photo-info p{
    opacity:0.8;
    margin-top:8px;
}
</style>
</head>

<body>

<h1>🎉 Galerie Anniversaire 🎉</h1>

<div id="galerie"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
    apiKey: "TA_CLE_API",
    authDomain: "talilaniversaire.firebaseapp.com",
    databaseURL: "https://talilaniversaire-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "talilaniversaire",
    storageBucket: "talilaniversaire.appspot.com",
    messagingSenderId: "TON_MESSAGING_ID",
    appId: "TON_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function chargerGalerie(){

    db.ref("galerie-pub").on("value", (snapshot)=>{

        const galerie = document.getElementById("galerie");

        galerie.innerHTML = "";

        const data = snapshot.val();

        if(!data){
            galerie.innerHTML = "<p>Aucune photo 😢</p>";
            return;
        }

        const items = Object.values(data);

        items.reverse().forEach((it)=>{

            if(!it.file || !it.file.data) return;

            galerie.innerHTML += `
                <div class="photo-card">

                    <img src="${it.file.data}">

                    <div class="photo-info">
                        <h3>${it.name || "Invité"}</h3>
                        <p>${it.msg || ""}</p>
                    </div>

                </div>
            `;
        });

    });

}

chargerGalerie();

</script>

</body>
</html>
